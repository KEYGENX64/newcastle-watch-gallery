<!-- Button -->
<ng-container *transloco="let t">

    <button mat-icon-button [matMenuTriggerFor]="userActions" [matTooltip]="t('Menu.User.Tooltip')">
        <mat-icon [svgIcon]="'heroicons_outline:user-circle'"></mat-icon>
    </button>
    <mat-menu [xPosition]="'before'" #userActions="matMenu">
        <div [dir]="currentDirection">
            <button mat-menu-item>
                <span class="flex flex-col leading-none">
                    <span>{{t("Menu.User.SignIn")}}</span>
                    <span class="mt-1.5 text-md font-medium">{{ user.nickName }}</span>
                </span>
            </button>
            <mat-divider class="my-2"></mat-divider>
            <button mat-menu-item routerLink="/information/user/profile">
                <mat-icon [svgIcon]="'heroicons_outline:user-circle'" class="me-2 ms-0"></mat-icon>
                <span>{{t("Menu.User.Profile")}}</span>
            </button>
            <button mat-menu-item routerLink="/information/user/change-mypassword">
                <mat-icon [svgIcon]="'mat_outline:password'" class="me-2 ms-0"></mat-icon>
                <span>{{t("Menu.User.ChangePassword")}}</span>
            </button>
            <!-- <button mat-menu-item routerLink="/setting">
                <mat-icon [svgIcon]="'heroicons_outline:cog-8-tooth'" class="me-2 ms-0"></mat-icon>
                <span>{{t("Menu.User.Setting")}}</span>
            </button> -->
            <mat-divider class="my-2"></mat-divider>
            <button mat-menu-item (click)="signOut()">
                <mat-icon [svgIcon]="'heroicons_outline:arrow-right-on-rectangle'" class="me-2 ms-0"></mat-icon>
                <span>{{t("Menu.User.SignOut")}}</span>
            </button>
        </div>

    </mat-menu>
</ng-container>
