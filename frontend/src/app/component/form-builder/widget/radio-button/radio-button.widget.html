<div class="flex flex-col mt-8 gt-sm:mt-0 gt-sm:ml-16">
    <span class="font-semibold mb-2">Push Notifications</span>
    <mat-radio-group class="flex flex-col" [color]="'primary'" [value]="'just-good'">
        <mat-radio-button class="mb-2" [value]="'everything'">
            Everything
        </mat-radio-button>
        <mat-radio-button class="mb-2" [value]="'just-good'">
            Just the good stuff
        </mat-radio-button>
        <mat-radio-button [value]="'no-push'">
            No push notifications
        </mat-radio-button>
    </mat-radio-group>
</div>
